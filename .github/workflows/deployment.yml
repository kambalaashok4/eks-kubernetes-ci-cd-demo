  #     - name: Configure AWS credentials
  #       uses: aws-actions/configure-aws-credentials@v4
  #       with:
  #         role-to-assume: arn:aws:iam::870388460414:role/github-actions-deploy
  #         aws-region: ${{ env.AWS_REGION }}
  #     - name: Scan image with Trivy
  #       uses: aquasecurity/trivy-action@master
  #       with:
  #         image-ref: 870388460414.dkr.ecr.us-east-1.amazonaws.com/eks/profile:${{ needs.build-and-push.outputs.image_tag }}
  #         format: 'table'
  #         exit-code: '1'
  #         severity: 'CRITICAL'
  #         output: 'trivy-report.txt'
  update-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          #repository: kambalaashok4/TetrisApp-Jenkins-EKS-ArgoCD-TF
          repository: kambalaashok4/eks-kubernetes-ci-cd-demo
          token: ${{ secrets.GITOPS_PAT }}

      - name: Update image tag
        run: |
          IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
          ECR_URI="870388460414.dkr.ecr.us-east-1.amazonaws.com/eks/profile"
          sed -i "s|image: .*|image: ${ECR_URI}:${IMAGE_TAG}|g " k8s/deployment.yaml
          cat k8s/deployment.yaml

      - name: Commit and push
        run: |
          git config user.name "kambalaashok4"
          git config user.email "kambalaashok4@gmail.com"
          git add k8s/deployment.yaml
          git commit -m "chore: update image tag to $IMAGE_TAG to manifests [skip ci]" || echo "No changes"
          git push origin HEAD:main